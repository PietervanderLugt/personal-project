function MacroBar({ label, grams, kcal, total, color }) {
  const pct = Math.round((kcal / total) * 100);
  return (
    <div style={{marginBottom:14}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
        <span style={{fontSize:12,color:"#94a3b8",letterSpacing:1}}>{label}</span>
        <span style={{fontSize:12,color:"#e2e8f0"}}>{grams}g <span style={{color:"#475569"}}>· {pct}%</span></span>
      </div>
      <div style={{height:6,background:"#1e2030",borderRadius:3,overflow:"hidden"}}>
        <div style={{height:"100%",width:`${pct}%`,background:color,borderRadius:3}} />
      </div>
    </div>
  );
}

function FolderNotes({ folderId, color }) {
  const key = `notes_${folderId}`;
  const [notes, setNotes] = useState(() => localStorage.getItem(key) || "");

  const [editing, setEditing] = useState(false);

  const handleSave = () => {
    localStorage.setItem(key, notes);
    setSaved(true);
    setEditing(false);
    setTimeout(() => setSaved(false), 2000);
  };

  const handleClear = () => {
    if (window.confirm("Clear all notes for this folder?")) {
      setNotes("");
      localStorage.removeItem(key);
    }
  };

  return (
    <div style={{marginTop:24,background:"#0f1117",border:`1px dashed ${color}40`,borderRadius:12,padding:18}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:12}}>📝</span>
          <span style={{fontSize:10,letterSpacing:2,color:color}}>MY NOTES</span>
        </div>
        <div style={{display:"flex",gap:6}}>
          {notes && !editing && (
            <button onClick={handleClear} style={{fontSize:9,color:"#334155",background:"none",border:"none",cursor:"pointer",letterSpacing:1,padding:"3px 8px"}}>CLEAR</button>
          )}
          {editing ? (
            <button onClick={handleSave} style={{fontSize:9,color:"#0a0a0f",background:color,border:"none",cursor:"pointer",letterSpacing:1,padding:"4px 12px",borderRadius:4,fontFamily:"'Courier New',monospace",fontWeight:700}}>
              SAVE
            </button>
          ) : (
            <button onClick={() => setEditing(true)} style={{fontSize:9,color:color,background:color+"15",border:`1px solid ${color}30`,cursor:"pointer",letterSpacing:1,padding:"4px 12px",borderRadius:4,fontFamily:"'Courier New',monospace"}}>
              {notes ? "EDIT" : "+ ADD NOTE"}
            </button>
          )}
        </div>
      </div>
      {editing ? (
        <textarea
          value={notes}
          onChange={e => setNotes(e.target.value)}
          autoFocus
          placeholder="Write anything — links to research, ideas, reminders, things to ask Claude..."
          style={{width:"100%",minHeight:120,background:"#0a0a0f",border:`1px solid ${color}30`,borderRadius:8,padding:"10px 12px",color:"#e2e8f0",fontSize:12,outline:"none",resize:"vertical",fontFamily:"'Courier New',monospace",lineHeight:1.7,boxSizing:"border-box"}}
        />
      ) : notes ? (
        <div style={{fontSize:12,color:"#94a3b8",lineHeight:1.8,whiteSpace:"pre-wrap",padding:"2px 0"}}>{notes}</div>
      ) : (
        <p style={{fontSize:11,color:"#334155",margin:0,fontStyle:"italic"}}>No notes yet. Hit "+ ADD NOTE" to write something.</p>
      )}
      {saved && <p style={{margin:"8px 0 0",fontSize:10,color:color,letterSpacing:1}}>✓ SAVED</p>}
    </div>
  );
}

function App() {
  const [activeFolder, setActiveFolder] = useState(null);
  const [activeTab, setActiveTab] = useState("folders");
  const [emailData, setEmailData] = useState({to:"",topic:"",subject:"",note:""});
  const [sending, setSending] = useState(false);
  const [sent, setSent] = useState(false);

  const handleSendEmail = async () => {
    setSending(true);
    await new Promise(r => setTimeout(r, 1800));
    setSending(false); setSent(true);
    setTimeout(() => { setSent(false); setEmailData({to:"",topic:"",subject:"",note:""}); }, 3000);
  };

  const activeTopic = TOPICS.find(t => t.id === activeFolder);

  return (
    <div style={{minHeight:"100vh",background:"#0a0a0f",color:"#e2e8f0",fontFamily:"'Courier New',monospace",position:"relative",overflow:"hidden"}}>
      <div className="grid-bg" />
      <div className="glow" />
      <div style={{position:"relative",zIndex:1,maxWidth:1100,margin:"0 auto",padding:"40px 24px 80px"}}>

        {/* Header */}
        <div style={{marginBottom:36}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
            <div style={{width:7,height:7,borderRadius:"50%",background:"#4ade80",boxShadow:"0 0 8px #4ade80"}} />
            <span style={{fontSize:10,letterSpacing:4,color:"#4ade80",textTransform:"uppercase"}}>Personal Hub — Active</span>
          </div>
          <h1 style={{fontSize:32,fontWeight:700,letterSpacing:-1,margin:0,fontFamily:"Georgia,serif",color:"#f1f5f9"}}>Personal Project</h1>
          <p style={{color:"#475569",marginTop:5,fontSize:12,letterSpacing:1}}>5 domains · Organized · Expandable</p>
        </div>

        {/* Tabs */}
        <div style={{display:"flex",gap:4,marginBottom:28,background:"#111118",borderRadius:8,padding:4,width:"fit-content",border:"1px solid #1e2030"}}>
          {[["folders","▤  Folders"],["roadmap","◈  OC Roadmap"],["email","✉  Remind Me"]].map(([id,label]) => (
            <button key={id} onClick={() => { setActiveTab(id); setActiveFolder(null); }} style={{padding:"7px 16px",borderRadius:6,border:"none",cursor:"pointer",fontSize:11,letterSpacing:1,background:activeTab===id?"#1e293b":"transparent",color:activeTab===id?"#e2e8f0":"#475569",transition:"all 0.2s"}}>
              {label}
            </button>
          ))}
        </div>

        {/* FOLDERS */}
        {activeTab === "folders" && (
          <div>
            {activeFolder ? (
              <div>
                <button onClick={() => setActiveFolder(null)} style={{display:"flex",alignItems:"center",gap:6,background:"none",border:"none",color:"#475569",cursor:"pointer",fontSize:11,letterSpacing:1,marginBottom:18}}>
                  ← BACK TO FOLDERS
                </button>
                <div style={{marginBottom:20}}>
                  <span style={{fontSize:10,letterSpacing:3,color:activeTopic?.color}}>{activeTopic?.tag?.toUpperCase()}</span>
                  <h2 style={{margin:"4px 0 0",fontFamily:"Georgia,serif",fontSize:24,color:"#f1f5f9"}}>{activeTopic?.label}</h2>
                </div>
                {activeFolder === "fitness" ? (
                  <div><FitnessDetail /><FolderNotes folderId="fitness" color="#4ade80" /></div>
                ) : activeFolder === "appearance" ? (
                  <div><AppearanceDetail /><FolderNotes folderId="appearance" color="#f59e0b" /></div>
                ) : (
                  <div style={{background:"#0f1117",border:"1px solid #1e2030",borderRadius:12,padding:22}}>
                    <p style={{color:"#64748b",fontSize:13,marginBottom:16,lineHeight:1.7}}>{activeTopic?.description}</p>
                    <p style={{fontSize:10,letterSpacing:2,color:"#334155",marginBottom:10}}>FOCUS AREAS</p>
                    {activeTopic?.subtopics?.map(s => (
                      <div key={s} style={{display:"flex",alignItems:"center",gap:8,fontSize:13,color:"#94a3b8",marginBottom:7}}>
                        <span style={{color:activeTopic?.color,fontSize:9}}>▸</span> {s}
                      </div>
                    ))}
                    <div style={{marginTop:18,padding:14,background:"#0a0a0f",borderRadius:8,border:"1px solid #1e2030"}}>
                      <p style={{margin:0,fontSize:11,color:"#475569"}}>Jump into this topic in the Claude chat — reference the folder and ask away.</p>
                    </div>
                    <FolderNotes folderId={activeFolder} color={activeTopic?.color} />
                  </div>
                )}
              </div>
            ) : (
              <div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(280px, 1fr))",gap:12}}>
                  {TOPICS.map(topic => (
                    <div key={topic.id} className="folder-card" onClick={() => setActiveFolder(topic.id)}
                      style={{background:"#0f1117",border:"1px solid #1e2030",borderRadius:12,padding:20,cursor:"pointer"}}
                      onMouseEnter={e => e.currentTarget.style.borderColor = topic.color+"55"}
                      onMouseLeave={e => e.currentTarget.style.borderColor = "#1e2030"}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                        <div style={{width:40,height:40,borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center",background:topic.color+"15",fontSize:18,border:`1px solid ${topic.color}25`}}>{topic.icon}</div>
                        <span style={{fontSize:9,letterSpacing:2,color:topic.color,background:topic.color+"15",padding:"3px 9px",borderRadius:20}}>{topic.tag.toUpperCase()}</span>
                      </div>
                      <h3 style={{margin:"0 0 6px",fontSize:15,fontFamily:"Georgia,serif",color:"#f1f5f9"}}>{topic.label}</h3>
                      <p style={{margin:"0 0 12px",fontSize:12,color:"#475569",lineHeight:1.6}}>{topic.description}</p>
                      {topic.id === "fitness" && (
                        <div style={{padding:"5px 9px",background:"#4ade8010",border:"1px solid #4ade8020",borderRadius:6,marginBottom:10}}>
                          <span style={{fontSize:9,color:"#4ade80",letterSpacing:1}}>✓ PROFILE LOADED · 3,340 KCAL · HEVY + MFP</span>
                        </div>
                      )}
                      {topic.id === "appearance" && (
                        <div style={{padding:"5px 9px",background:"#f59e0b10",border:"1px solid #f59e0b20",borderRadius:6,marginBottom:10}}>
                          <span style={{fontSize:9,color:"#f59e0b",letterSpacing:1}}>✓ 5 PRODUCTS LOADED · EVIDENCE-BASED ONLY</span>
                        </div>
                      )}
                      <span style={{fontSize:10,color:"#334155"}}>Open folder →</span>
                    </div>
                  ))}
                </div>
                <div style={{marginTop:16,padding:16,background:"#0f1117",border:"1px dashed #1e2030",borderRadius:12}}>
                  <p style={{margin:"0 0 4px",fontSize:9,color:"#fb923c",letterSpacing:3}}>WHY PERSONAL FINANCE AT 21</p>
                  <p style={{margin:0,fontSize:12,color:"#475569",lineHeight:1.7,maxWidth:700}}>Compound interest starts now, not at 30. A chemistry student who thinks systematically already has the right mindset for investing. At 21 with low expenses, even small consistent investments have a 40+ year runway.</p>
                </div>
              </div>
            )}
          </div>
        )}

        {/* OC ROADMAP */}
        {activeTab === "roadmap" && (
          <div>
            <div style={{marginBottom:22}}>
              <h2 style={{fontFamily:"Georgia,serif",fontSize:22,margin:"0 0 5px"}}>Organic Chemistry Mastery Plan</h2>
              <p style={{color:"#475569",fontSize:12,margin:0}}>14-week · OC1 refresh + full OC2 · Principle → Mechanism → Application</p>
            </div>
            <div style={{position:"relative"}}>
              <div style={{position:"absolute",left:30,top:0,bottom:0,width:1,background:"#1e2030"}} />
              {OC_ROADMAP.map(phase => (
                <div key={phase.phase} style={{display:"flex",gap:20,marginBottom:4}}>
                  <div style={{flexShrink:0,position:"relative",zIndex:1}}>
                    <div style={{width:60,height:60,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",background:"#0a0a0f",border:`2px solid ${phase.color}`,color:phase.color,fontSize:13,fontWeight:700,letterSpacing:1,boxShadow:`0 0 12px ${phase.color}20`}}>{phase.phase}</div>
                  </div>
                  <div style={{flex:1,background:"#0f1117",border:"1px solid #1e2030",borderRadius:10,padding:16,marginBottom:12}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                      <h3 style={{margin:0,fontSize:14,fontFamily:"Georgia,serif",color:"#f1f5f9"}}>{phase.title}</h3>
                      <span style={{fontSize:9,color:phase.color,background:phase.color+"15",padding:"2px 9px",borderRadius:20,letterSpacing:1}}>{phase.duration.toUpperCase()}</span>
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4}}>
                      {phase.items.map(item => (
                        <div key={item} style={{fontSize:11,color:"#94a3b8",display:"flex",gap:5,alignItems:"center"}}>
                          <span style={{color:phase.color,fontSize:7}}>◆</span> {item}
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* EMAIL */}
        {activeTab === "email" && (
          <div style={{maxWidth:480}}>
            <div style={{marginBottom:22}}>
              <h2 style={{fontFamily:"Georgia,serif",fontSize:22,margin:"0 0 5px"}}>Send Yourself a Reminder</h2>
              <p style={{color:"#475569",fontSize:12,margin:0}}>Flag something to follow up on — lands in your inbox.</p>
            </div>
            {sent ? (
              <div style={{padding:28,background:"#0f1117",border:"1px solid #4ade8040",borderRadius:12,textAlign:"center"}}>
                <div style={{fontSize:32,marginBottom:8}}>✓</div>
                <p style={{color:"#4ade80",fontFamily:"Georgia,serif",margin:0}}>Reminder sent!</p>
              </div>
            ) : (
              <div style={{display:"flex",flexDirection:"column",gap:12}}>
                {[{label:"YOUR EMAIL",key:"to",placeholder:"you@email.com"},{label:"SUBJECT",key:"subject",placeholder:"e.g. Research creatine loading protocol"}].map(f => (
                  <div key={f.key}>
                    <label style={{fontSize:9,letterSpacing:2,color:"#475569",display:"block",marginBottom:5}}>{f.label}</label>
                    <input value={emailData[f.key]} onChange={e => setEmailData({...emailData,[f.key]:e.target.value})} placeholder={f.placeholder}
                      style={{width:"100%",background:"#0f1117",border:"1px solid #1e2030",borderRadius:8,padding:"10px 13px",color:"#e2e8f0",fontSize:13,outline:"none"}} />
                  </div>
                ))}
                <div>
                  <label style={{fontSize:9,letterSpacing:2,color:"#475569",display:"block",marginBottom:5}}>FOLDER</label>
                  <select value={emailData.topic} onChange={e => setEmailData({...emailData,topic:e.target.value})}
                    style={{width:"100%",background:"#0f1117",border:"1px solid #1e2030",borderRadius:8,padding:"10px 13px",color:emailData.topic?"#e2e8f0":"#475569",fontSize:13,outline:"none"}}>
                    <option value="">Select folder...</option>
                    {TOPICS.map(t => <option key={t.id} value={t.label}>{t.icon} {t.label}</option>)}
                  </select>
                </div>
                <div>
                  <label style={{fontSize:9,letterSpacing:2,color:"#475569",display:"block",marginBottom:5}}>NOTES</label>
                  <textarea value={emailData.note} onChange={e => setEmailData({...emailData,note:e.target.value})} rows={3} placeholder="Context, links, why this matters..."
                    style={{width:"100%",background:"#0f1117",border:"1px solid #1e2030",borderRadius:8,padding:"10px 13px",color:"#e2e8f0",fontSize:13,outline:"none",resize:"vertical"}} />
                </div>
                <button onClick={handleSendEmail} disabled={!emailData.to||!emailData.subject||sending}
                  style={{padding:"12px 20px",background:emailData.to&&emailData.subject?"#4ade80":"#1e2030",color:emailData.to&&emailData.subject?"#0a0a0f":"#334155",border:"none",borderRadius:8,fontSize:11,letterSpacing:2,cursor:emailData.to&&emailData.subject?"pointer":"not-allowed",fontWeight:700,transition:"all 0.2s"}}>
                  {sending ? "SENDING..." : "✉  SEND REMINDER"}
                </button>
              </div>
            )}
          </div>
        )}

        <div style={{marginTop:52,paddingTop:18,borderTop:"1px solid #1e2030",display:"flex",justifyContent:"space-between"}}>
          <span style={{fontSize:9,color:"#1e2030",letterSpacing:2}}>PERSONAL PROJECT v1.1</span>
          <span style={{fontSize:9,color:"#1e2030",letterSpacing:1}}>5 folders · Claude-powered</span>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(React.createElement(App), document.getElementById('root'));
</script>
</body>
</html>
